# Dominio mayoreo.cloud — Laravel (plataforma de ofertas)
# PHP-FPM en este servidor escucha en 127.0.0.1:19000 (no socket)

server {
    listen 80;
    listen [::]:80;
    server_name mayoreo.cloud www.mayoreo.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mayoreo.cloud www.mayoreo.cloud;

    root /home/mayoreo/htdocs/mayoreo-cloud/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/mayoreo.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mayoreo.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:19000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_PORT 443;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location /storage {
        alias /home/mayoreo/htdocs/mayoreo-cloud/public/storage;
    }
}
